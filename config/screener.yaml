# 台股篩選系統設定：調整權重、門檻與價格狀態規則不需改程式。
run:
  market: TWSE
  lookback_days: 180
  recommendation_limit: 30
  minimum_total_score: 70
  require_price_stage: completed_base

fundamental_score:
  weights:
    revenue_growth_yoy: 25
    operating_margin: 20
    roe: 25
    eps_growth_yoy: 20
    debt_ratio_inverse: 10
  thresholds:
    revenue_growth_yoy: [0, 5, 10, 20]
    operating_margin: [0, 5, 10, 20]
    roe: [0, 8, 12, 18]
    eps_growth_yoy: [0, 5, 15, 30]
    debt_ratio_inverse: [80, 60, 40, 25]

chip_score:
  weights:
    foreign_net_buy_ratio_5d: 25
    investment_trust_net_buy_ratio_5d: 25
    dealer_net_buy_ratio_5d: 10
    margin_balance_change_5d_inverse: 15
    main_holder_ratio_change_4w: 25
  thresholds:
    foreign_net_buy_ratio_5d: [-1, 0, 0.3, 0.8]
    investment_trust_net_buy_ratio_5d: [-0.5, 0, 0.2, 0.6]
    dealer_net_buy_ratio_5d: [-0.5, 0, 0.1, 0.3]
    margin_balance_change_5d_inverse: [10, 5, 0, -5]
    main_holder_ratio_change_4w: [-1, 0, 1, 3]

price_stage:
  correction:
    min_drawdown_from_60d_high_pct: 12
    max_price_vs_ma20_pct: -3
  consolidating:
    max_20d_range_pct: 16
    max_ma20_slope_pct: 2
    min_days_after_correction: 10
  completed_base:
    max_20d_range_pct: 14
    min_close_vs_ma20_pct: 1
    min_ma20_vs_ma60_pct: -2
    min_volume_vs_20d_avg: 1.1
    breakout_buffer_pct: 2
  extended:
    min_gain_from_20d_low_pct: 25
    min_close_vs_ma20_pct: 10

recommendation:
  total_weights:
    fundamental: 0.45
    chip: 0.35
    price_setup: 0.20
